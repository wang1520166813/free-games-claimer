name: Sync Upstream

on:
  schedule:
    # 每天 UTC 1:00 检查上游更新
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add upstream
        run: git remote add upstream https://github.com/vogler/free-games-claimer.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream
        run: |
          git merge upstream/main --no-edit || echo "No updates or merge conflict"

      - name: Push changes
        run: git push origin main
