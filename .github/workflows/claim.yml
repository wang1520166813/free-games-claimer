name: Auto Claim Free Games

on:
  schedule:
    # 每天 UTC 0:00 运行（北京时间早上8点）
    - cron: '0 0 * * *'
  workflow_dispatch: # 手动触发

jobs:
  claim:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Firefox
        run: npx playwright install firefox --with-deps

      - name: Install Apprise (for notifications)
        run: pip install apprise

      - name: Claim Epic Games
        env:
          EG_EMAIL: ${{ secrets.EG_EMAIL }}
          EG_PASSWORD: ${{ secrets.EG_PASSWORD }}
          EG_OTPKEY: ${{ secrets.EG_OTPKEY }}
          NOTIFY: ${{ secrets.NOTIFY }}
        run: node epic-games.js
        continue-on-error: true

      - name: Claim Prime Gaming
        env:
          PG_EMAIL: ${{ secrets.PG_EMAIL }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          PG_OTPKEY: ${{ secrets.PG_OTPKEY }}
          NOTIFY: ${{ secrets.NOTIFY }}
        run: node prime-gaming.js
        continue-on-error: true

      - name: Claim GOG
        env:
          GOG_EMAIL: ${{ secrets.GOG_EMAIL }}
          GOG_PASSWORD: ${{ secrets.GOG_PASSWORD }}
          NOTIFY: ${{ secrets.NOTIFY }}
        run: node gog.js
        continue-on-error: true

      - name: Claim Unreal Engine Assets
        env:
          EG_EMAIL: ${{ secrets.EG_EMAIL }}
          EG_PASSWORD: ${{ secrets.EG_PASSWORD }}
          EG_OTPKEY: ${{ secrets.EG_OTPKEY }}
          NOTIFY: ${{ secrets.NOTIFY }}
        run: node unrealengine.js
        continue-on-error: true
