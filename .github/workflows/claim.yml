name: Auto Claim Epic Games

on:
  schedule:
    # 每天 UTC 0:00 运行（北京时间早上8点）
    - cron: '0 0 * * *'
  workflow_dispatch: # 手动触发

jobs:
  claim:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Firefox
        run: npx playwright install firefox --with-deps

      - name: Install Apprise (for notifications)
        run: pip install apprise

      - name: Claim Epic Games
        env:
          EG_EMAIL: ${{ secrets.EG_EMAIL }}
          EG_PASSWORD: ${{ secrets.EG_PASSWORD }}
          EG_OTPKEY: ${{ secrets.EG_OTPKEY }}
          NOTIFY: ${{ secrets.NOTIFY }}
        run: node epic-games.js